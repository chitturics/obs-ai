global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: 'chainlit_app'
    metrics_path: '/metrics'
    scrape_interval: 15s
    static_configs:
      - targets: ['localhost:8090']
        labels:
          component: 'chainlit'

  - job_name: 'search_optimizer'
    metrics_path: '/metrics'
    scrape_interval: 15s
    static_configs:
      - targets: ['localhost:9005']
        labels:
          component: 'search_optimizer'

  # Note: Ollama does not expose Prometheus-format metrics.
  # LLM call metrics are tracked by the chainlit_app via:
  #   chainlit_llm_calls_total, chainlit_llm_latency_seconds

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          component: 'prometheus'
