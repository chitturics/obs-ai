[get_notable_events(1)]
definition = index=notable $severity_filter$ | stats count by rule_name, urgency, owner | sort -count
args = severity_filter
iseval = 0
description = Retrieve notable events filtered by severity

[cim_authentication]
definition = tag=authentication action=* | eval status=if(action="success","success","failure")
iseval = 0
description = CIM-compliant authentication data model base search

[time_range_filter(2)]
definition = earliest=$start$ latest=$end$
args = start, end
iseval = 0
description = Apply a time range filter with start and end parameters

[calculate_avg_response_time]
definition = stats avg(response_time) as avg_rt p95(response_time) as p95_rt by service_name | eval avg_rt=round(avg_rt,2) | eval p95_rt=round(p95_rt,2)
iseval = 0
description = Calculate average and P95 response time grouped by service name
