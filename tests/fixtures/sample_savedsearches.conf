[Failed Login Attempts - Last 24h]
search = index=security sourcetype=WinEventLog:Security EventCode=4625 | stats count by src_ip, user | sort -count
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
cron_schedule = 0 */4 * * *
is_scheduled = 1
alert_type = number of events
alert_comparator = greater than
alert_threshold = 100
description = Detects high volume of failed login attempts across the environment
action.email.to = soc@company.com
disabled = 0

[Network Traffic by Host - Hourly]
search = index=network sourcetype=firewall action=allowed | timechart span=1h count by dest_ip | head 20
dispatch.earliest_time = -1h@h
dispatch.latest_time = now
cron_schedule = 5 * * * *
is_scheduled = 1
description = Hourly summary of allowed network traffic grouped by destination IP

[DNS Query Analysis]
search = index=dns sourcetype=stream:dns query_type=A | stats count dc(src_ip) as unique_sources by query | where count > 1000 | sort -count
dispatch.earliest_time = -4h@h
dispatch.latest_time = now
cron_schedule = 0 */6 * * *
is_scheduled = 1
description = Identifies high-volume DNS queries that may indicate DNS tunneling or beaconing
