[syslog]
SHOULD_LINEMERGE = true
BREAK_ONLY_BEFORE_DATE = true
TIME_FORMAT = %b %d %H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD = 15
NO_BINARY_CHECK = true
SEDCMD-strip_ansi = s/\x1b\[[0-9;]*m//g

[ps]
LINE_BREAKER = ([\r\n]+)
SHOULD_LINEMERGE = false
INDEXED_EXTRACTIONS = csv
FIELD_NAMES = USER,PID,CPU,MEM,VSZ,RSS,TTY,STAT,START,TIME,COMMAND
FIELD_DELIMITER = " "
HEADER_FIELD_LINE_NUMBER = 0
TIME_FORMAT = %H:%M:%S
DATETIME_CONFIG = CURRENT

[top]
LINE_BREAKER = ([\r\n]+)
SHOULD_LINEMERGE = false
TRUNCATE = 50000
TIME_FORMAT = %H:%M:%S
DATETIME_CONFIG = CURRENT

[cpu]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TIME_FORMAT = %s
METRICS_PROTOCOL = statsd
STATSD-DIM-TRANSFORMS = cpu_dims

[df]
LINE_BREAKER = ([\r\n]+)
SHOULD_LINEMERGE = false
HEADER_MODE = always
CHECK_FOR_HEADER = true

[vmstat]
LINE_BREAKER = ([\r\n]+)
SHOULD_LINEMERGE = false
TIME_FORMAT = %s
INGEST_EVAL = metric_name="vmstat." . field_name
