# Local overrides for TA-windows
[WinEventLog:Security]
# Override TIME_FORMAT from default
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%6NZ
TZ = America/New_York
INGEST_EVAL = index=if(match(EventCode,"^(4625|4648)$"),"security_critical",index)
TRANSFORMS-extract = extract_winsec_fields
TRANSFORMS-host = set_host_from_event
TRANSFORMS-st_override = override_sourcetype
TRANSFORMS-clone = clone_critical_events
