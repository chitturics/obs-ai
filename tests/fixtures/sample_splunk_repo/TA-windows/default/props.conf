[WinEventLog:Security]
LINE_BREAKER = ([\r\n]+)(?=<Event)
SHOULD_LINEMERGE = false
TIME_FORMAT = %m/%d/%Y %I:%M:%S %p
TIME_PREFIX = TimeCreated SystemTime='
MAX_TIMESTAMP_LOOKAHEAD = 30
TRUNCATE = 999999
TZ = UTC
SEDCMD-cleanxml = s/<\/?Data[^>]*>//g
TRANSFORMS-nullqueue = setnull_winsecurity
TRANSFORMS-route-index = route_winsecurity_to_index

[WinEventLog:System]
LINE_BREAKER = ([\r\n]+)(?=<Event)
SHOULD_LINEMERGE = false
TIME_FORMAT = %m/%d/%Y %I:%M:%S %p
TIME_PREFIX = TimeCreated SystemTime='
TRUNCATE = 999999

[WinEventLog:Application]
LINE_BREAKER = ([\r\n]+)(?=<Event)
SHOULD_LINEMERGE = false
TIME_FORMAT = %Y-%m-%dT%H:%M:%S
CHARSET = utf-8
