[setnull_winsecurity]
REGEX = EventCode=(4688|4689|4634)
DEST_KEY = queue
FORMAT = nullQueue

[route_winsecurity_to_index]
REGEX = EventCode=4625
DEST_KEY = _MetaData:Index
FORMAT = security_alerts

[extract_winsec_fields]
REGEX = (?<src_ip>\d+\.\d+\.\d+\.\d+).*?(?<dest_ip>\d+\.\d+\.\d+\.\d+)
FORMAT = src_ip::$1 dest_ip::$2
WRITE_META = true

[set_host_from_event]
REGEX = Computer='(?<host>[^']+)'
DEST_KEY = MetaData:Host
FORMAT = host::$1

[override_sourcetype]
REGEX = (?:^|\s)Type=(?<event_type>\w+)
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::WinEventLog:$1

[clone_critical_events]
REGEX = EventCode=(4625|4648|4719|4765|4766|4794|4897)
CLONE_SOURCETYPE = wineventlog_critical_clone
