[firewall]
LINE_BREAKER = ([\r\n]+)
SHOULD_LINEMERGE = false
TIME_FORMAT = %Y-%m-%dT%H:%M:%S%z
TRANSFORMS-route = route_fw_by_action
TRANSFORMS-drop_noisy = drop_fw_noise
TRANSFORMS-extract_fields = extract_fw_fields
SEDCMD-normalize_action = s/(?i)(allow|permit)/allowed/g s/(?i)(deny|drop|block)/blocked/g

[firewall:paloalto]
LINE_BREAKER = ([\r\n]+)
SHOULD_LINEMERGE = false
TIME_FORMAT = %Y/%m/%d %H:%M:%S
sourcetype = pan:firewall
INGEST_EVAL = vendor="paloalto", action=lower(action)

[firewall:checkpoint]
LINE_BREAKER = ([\r\n]+)
SHOULD_LINEMERGE = false
TIME_FORMAT = %d%b%Y %H:%M:%S
TZ_ALIAS = IST=Asia/Kolkata EST=America/New_York
rename = checkpoint:firewall
INGEST_EVAL = vendor="checkpoint"
