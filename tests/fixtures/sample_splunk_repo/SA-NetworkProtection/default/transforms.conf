[route_fw_by_action]
REGEX = action=(?<action>blocked|denied|dropped)
DEST_KEY = _MetaData:Index
FORMAT = security_blocked

[drop_fw_noise]
REGEX = action=(?:heartbeat|keepalive)
DEST_KEY = queue
FORMAT = nullQueue

[extract_fw_fields]
REGEX = src=(?<src>\S+)\s+dst=(?<dest>\S+)\s+port=(?<dest_port>\d+)
FORMAT = src::$1 dest::$2 dest_port::$3
WRITE_META = true

[override_fw_source]
REGEX = device_id=(?<device>[^,]+)
DEST_KEY = MetaData:Source
FORMAT = source::firewall:$1

[set_fw_time]
REGEX = epoch_time=(?<epoch>\d+)
DEST_KEY = _time
FORMAT = $1

[route_tcp_fw]
REGEX = protocol=tcp
DEST_KEY = _TCP_ROUTING
FORMAT = fw_tcp_group

[modify_raw_fw]
REGEX = password=\S+
DEST_KEY = _raw
FORMAT = password=REDACTED
