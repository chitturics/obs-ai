# v2.0.0: TRANSFORMS-syslog renamed, new stanza added, index-time keys changed
[source::syslog]
TRANSFORMS-syslog-v2=syslog_extract_v2
FIELDALIAS-host=hostname AS host
LINE_BREAKER=([\r\n]+)
TIME_FORMAT=%Y-%m-%dT%H:%M:%S
SHOULD_LINEMERGE=false
# New key added in v2
MAX_TIMESTAMP_LOOKAHEAD=32

[source::application_log]
FIELDALIAS-user=username AS user
EXTRACT-status=status=(?<status>\w+)
# TRANSFORMS-app removed in v2

[source::new_sourcetype]
TRANSFORMS-new=new_extract
EXTRACT-id=id=(?<record_id>\d+)
