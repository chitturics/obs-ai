# v2.0.0: syslog_extract updated, app_extract regex changed
[syslog_extract_v2]
REGEX=(?<host>\S+)\s+(?<ts>\S+)\s+(?<message>.+)
FORMAT=host::$1 ts::$2 message::$3

[app_extract]
REGEX=application=(?<app_name>\w+)\s+severity=(?<level>\w+)
FORMAT=app_name::$1 level::$2

[ip_lookup]
filename=ip_addresses_v2.csv
fields_list=ip,location,owner,datacenter

[new_lookup]
filename=new_table.csv
fields_list=id,name
