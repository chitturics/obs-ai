worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 50m;

    # Podman/Docker DNS resolver — re-resolve on every request (no stale IPs)
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    server {
        listen 80;
        server_name _;

        # ---- Chainlit app (default) ----
        location / {
            set $chainlit_backend http://chat_ui_app:8000;
            proxy_pass $chainlit_backend$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # ---- Admin API ----
        location /api/ {
            set $chainlit_backend http://chat_ui_app:8000;
            proxy_pass $chainlit_backend$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        # ---- WebSocket ----
        location /ws {
            set $chainlit_backend http://chat_ui_app:8000;
            proxy_pass $chainlit_backend$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # ---- Grafana (/grafana/) ----
        location /grafana/ {
            set $grafana_backend http://grafana_monitoring:3000;
            rewrite ^/grafana/(.*) /$1 break;
            proxy_pass $grafana_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- Prometheus (/prometheus/) ----
        location /prometheus/ {
            set $prom_backend http://prometheus_monitoring:9090;
            proxy_pass $prom_backend$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- Hoppscotch (/hoppscotch/) ----
        location /hoppscotch/ {
            set $hop_backend http://hoppscotch_api:3000;
            rewrite ^/hoppscotch/(.*) /$1 break;
            proxy_pass $hop_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            sub_filter_once off;
            sub_filter 'href="/' 'href="/hoppscotch/';
            sub_filter 'src="/' 'src="/hoppscotch/';
            sub_filter_types text/html application/javascript;
        }

        # ---- Search Optimizer docs (/search-opt/) ----
        location /search-opt/ {
            set $sopt_backend http://search_opt_service:9005;
            rewrite ^/search-opt/(.*) /$1 break;
            proxy_pass $sopt_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Health check
        location /nginx-health {
            access_log off;
            return 200 '{"status":"ok","service":"nginx-gateway"}';
            add_header Content-Type application/json;
        }
    }

    # HTTPS server (port 443) - uncomment when SSL certificates are ready
    # Cert volume: ./certs:/etc/nginx/ssl:ro (in docker-compose.yml)
